<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Charts Playground</title>
    <link rel="stylesheet" href="./chart.css" />

    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #000;
        color: white;
        overflow: hidden;
      }

      #app {
        width: 100vw;
        height: 100vh;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
        height: 100%;
        gap: 8px;
        padding: 8px;
        box-sizing: border-box;
      }

      .chart-column {
        display: grid;
        grid-template-rows: 1fr repeat(4, 80px);
        gap: 6px;
        min-width: 0;
        min-height: 0;
      }

      .chart {
        background: #111;
        min-height: 0;
      }

      .indicator-pane {
        background: #1b1b1b;
        border-top: 1px solid #333;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="workspace">
        <!-- Columna izquierda -->
        <div class="chart-column">
          <div id="chart-left" class="chart-area"></div>

          <div id="left-pane-1" class="indicator-pane"></div>
          <div id="left-pane-2" class="indicator-pane"></div>
          <div id="left-pane-3" class="indicator-pane"></div>
          <div id="left-pane-4" class="indicator-pane"></div>
        </div>

        <!-- Columna derecha -->
        <div class="chart-column">
          <div id="chart-right" class="chart-area"></div>

          <div id="right-pane-1" class="indicator-pane"></div>
          <div id="right-pane-2" class="indicator-pane"></div>
          <div id="right-pane-3" class="indicator-pane"></div>
          <div id="right-pane-4" class="indicator-pane"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
