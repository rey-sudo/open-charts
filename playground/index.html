<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Charts Playground</title>

    <link rel="stylesheet" href="./chart.css" />

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;

        background: #000;
        color: #fff;
        font-family: system-ui, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;

        width: 100%;
        height: 100%;

        padding: 4px;
        box-sizing: border-box;
      }

      .chart-column {
        gap: 0.5rem;
        display: flex;
        flex-direction: column;

        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;

        background: #111;
      }

      /* Chrome / Edge / Safari */
      .chart-column::-webkit-scrollbar {
        width: 1rem;
      }

      .chart-column::-webkit-scrollbar-track {
        background: transparent;
      }

      .chart-column::-webkit-scrollbar-thumb {
        background: transparent;
        border-radius: 4px;
        transition: background 0.2s;
      }

      .chart-column::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.35);
      }

      .chart-column::-webkit-scrollbar-corner {
        background: transparent;
      }

      #chart-left,
      #chart-right {
        min-height: 600px;
      }

      .indicator-pane {
        min-height: 300px;
        flex-shrink: 0;
        border-top: 1px solid #333;
        background: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="workspace">
        <!-- Izquierda -->
        <div class="chart-column">
          <div id="chart-left" class="chart-area"></div>

          <div id="left-pane-1" class="chart-area indicator-pane"></div>
          <div id="left-pane-2" class="chart-area indicator-pane"></div>
          <div id="left-pane-3" class="indicator-pane"></div>
          <div id="left-pane-4" class="indicator-pane"></div>
        </div>

        <!-- Derecha -->
        <div class="chart-column">
          <div id="chart-right" class="chart-area"></div>

          <div id="right-pane-1" class="indicator-pane"></div>
          <div id="right-pane-2" class="indicator-pane"></div>
          <div id="right-pane-3" class="indicator-pane"></div>
          <div id="right-pane-4" class="indicator-pane"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
